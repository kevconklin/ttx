version: "3.9"

# Development overlay: hot reload + source bind mounts.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
      RELOAD: "1"

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
